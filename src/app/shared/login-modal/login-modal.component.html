<div class="modal-overlay" [class.open]="isOpen" (click)="onOverlayClick($event)">
  <div class="modal-box">
    <button class="modal-close" (click)="close()">✕</button>
    <div class="modal-logo">
      <svg width="28" height="28" viewBox="0 0 80 80" fill="none"><path d="M40 70 C18 55, 8 40, 8 28 C8 18, 16 10, 26 10 C32 10, 37 13, 40 17 C43 13, 48 10, 54 10 C64 10, 72 18, 72 28 C72 40, 62 55, 40 70Z" stroke="#4BBFDE" stroke-width="4.5" fill="none"/><ellipse cx="34" cy="30" rx="5.5" ry="7" stroke="#4BBFDE" stroke-width="3.5" fill="none"/><ellipse cx="46" cy="30" rx="5.5" ry="7" stroke="#4BBFDE" stroke-width="3.5" fill="none"/><ellipse cx="25" cy="36" rx="4.5" ry="6" stroke="#4BBFDE" stroke-width="3.5" fill="none"/><ellipse cx="55" cy="36" rx="4.5" ry="6" stroke="#4BBFDE" stroke-width="3.5" fill="none"/><path d="M28 46 Q40 58 52 46 Q48 38 40 36 Q32 38 28 46Z" stroke="#4BBFDE" stroke-width="3.5" fill="none"/></svg>
      <span>Tender<strong>Tails</strong></span>
    </div>
    <h2>Welcome back 🐾</h2>
    <p class="modal-sub">Sign in or create your account to manage bookings</p>
    <div class="modal-tabs">
      <div class="mtab" [class.active]="activeTab==='login'"  (click)="activeTab='login'">Sign In</div>
      <div class="mtab" [class.active]="activeTab==='signup'" (click)="activeTab='signup'">Register</div>
    </div>
    <div *ngIf="activeTab === 'login'">
      <div class="social-login">
        <button class="social-btn" (click)="socialLogin('Google')">🟡 Google</button>
        <button class="social-btn" (click)="socialLogin('Facebook')">🔵 Facebook</button>
      </div>
      <div class="divider-or">or sign in with email</div>
      <div class="form-group"><label>Email or Phone</label><input type="text" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="Your password"/></div>
      <button class="btn-primary full-w" (click)="submit()">Sign In →</button>
      <p class="terms-text">By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>
    </div>
    <div *ngIf="activeTab === 'signup'">
      <div class="social-login">
        <button class="social-btn" (click)="socialLogin('Google')">🟡 Google</button>
        <button class="social-btn" (click)="socialLogin('Facebook')">🔵 Facebook</button>
      </div>
      <div class="divider-or">or register with email</div>
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" placeholder="First name"/></div>
        <div class="form-group"><label>Last Name</label><input type="text" placeholder="Last name"/></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Phone</label><input type="tel" placeholder="+91 98765 43210"/></div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="Create a password"/></div>
      <button class="btn-primary full-w" (click)="submit()">Create Account →</button>
      <p class="terms-text">By registering, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>
    </div>
  </div>
</div>
